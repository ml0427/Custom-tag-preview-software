<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="62%" cy="50%" r="48%">
      <stop offset="0%" stop-color="#f0b429" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f0b429" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="bg-clip">
      <rect width="512" height="512" rx="104"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="104" fill="#0e0e1a"/>
  <rect width="512" height="512" rx="104" fill="url(#glow)"/>

  <!-- Drop shadow layer (offset tag for depth) -->
  <path d="M 150 268 L 206 168 Q 218 150 238 150 L 372 150 Q 396 150 396 174 L 396 358 Q 396 382 372 382 L 238 382 Q 218 382 206 362 Z"
        fill="#f0b429" opacity="0.18"/>

  <!-- Main tag shape -->
  <path d="M 138 256 L 196 152 Q 208 132 230 132 L 370 132 Q 396 132 396 158 L 396 354 Q 396 380 370 380 L 230 380 Q 208 380 196 360 Z"
        fill="#f0b429"/>

  <!-- Top-edge highlight for depth -->
  <path d="M 138 256 L 196 152 Q 208 132 230 132 L 370 132"
        fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.18"/>

  <!-- Tag hole (string/punch hole) -->
  <circle cx="166" cy="256" r="24" fill="#0e0e1a"/>

  <!-- 2×2 thumbnail grid inside tag body -->
  <!-- Row 1 -->
  <rect x="228" y="170" width="68" height="68" rx="12" fill="#0e0e1a" opacity="0.52"/>
  <rect x="308" y="170" width="68" height="68" rx="12" fill="#0e0e1a" opacity="0.52"/>
  <!-- Row 2 -->
  <rect x="228" y="250" width="68" height="68" rx="12" fill="#0e0e1a" opacity="0.52"/>
  <rect x="308" y="250" width="68" height="68" rx="12" fill="#0e0e1a" opacity="0.52"/>

  <!-- Tiny image icons inside cells — landscape + sun motif (amber on dark) -->
  <!-- Top-left cell: mountain landscape -->
  <path d="M 232 230 L 250 200 L 263 216 L 279 198 L 292 230 Z" fill="#f0b429" opacity="0.6"/>
  <circle cx="248" cy="186" r="9" fill="#f0b429" opacity="0.6"/>

  <!-- Top-right cell: abstract lines (list/metadata) -->
  <rect x="318" y="192" width="38" height="7" rx="3.5" fill="#f0b429" opacity="0.5"/>
  <rect x="318" y="206" width="28" height="7" rx="3.5" fill="#f0b429" opacity="0.38"/>
  <rect x="318" y="220" width="34" height="7" rx="3.5" fill="#f0b429" opacity="0.3"/>

  <!-- Bottom-left cell: grid/tile icon -->
  <rect x="234" y="258" width="24" height="24" rx="5" fill="#f0b429" opacity="0.45"/>
  <rect x="264" y="258" width="24" height="24" rx="5" fill="#f0b429" opacity="0.3"/>
  <rect x="234" y="286" width="24" height="24" rx="5" fill="#f0b429" opacity="0.3"/>
  <rect x="264" y="286" width="24" height="24" rx="5" fill="#f0b429" opacity="0.18"/>

  <!-- Bottom-right cell: tag/label mini icon -->
  <path d="M 316 298 L 334 270 Q 338 264 344 264 L 368 264 Q 374 264 374 270 L 374 312 Q 374 318 368 318 L 344 318 Q 338 318 334 312 Z"
        fill="#f0b429" opacity="0.5"/>
  <circle cx="320" cy="291" r="5.5" fill="#0e0e1a" opacity="0.6"/>

  <!-- Bottom text label lines (representing file metadata rows) -->
  <rect x="228" y="334" width="92" height="9" rx="4.5" fill="#0e0e1a" opacity="0.42"/>
  <rect x="228" y="350" width="64" height="9" rx="4.5" fill="#0e0e1a" opacity="0.28"/>
</svg>

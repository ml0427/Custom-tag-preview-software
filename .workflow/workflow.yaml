schema_version: "0.1"
name: "portable-ai-workflows"
description: >
  Cross-AI workflow specifications for repeatable engineering tasks.
  The workflow defines steps, evidence, gates, and report format.
  AI providers are adapters, not part of the workflow contract.

runtime_contract:
  principles:
    - "Workflow fixes the route, not the answer."
    - "Judgment stays in AI steps; evidence collection and verification stay in tool steps."
    - "Provider-specific features must be hidden behind adapters."
    - "Low-judgment execution can be delegated; decisions remain with the lead agent."
  adapters:
    ai:
      required_capabilities:
        - "read provided context"
        - "return structured JSON or Markdown"
        - "explain uncertainty"
    shell:
      required_capabilities:
        - "run commands in workspace"
        - "capture stdout, stderr, and exit code"
    file:
      required_capabilities:
        - "read files"
        - "write generated reports"
    optional:
      github:
        required_capabilities:
          - "fetch issue or pull request metadata"
          - "read changed files"
      local_memory:
        required_capabilities:
          - "search bounded local memory and workflow artifacts"
          - "record durable architecture, trap, or design facts only when reusable"
          - "keep transient task state in workflow run artifacts"

local_memory_policy:
  preferred_sources:
    - ".mc-memory/MEMORY.md"
    - ".mc-memory/PROJECTS.md"
    - ".mc-memory/USER.md when the project actually needs user-specific durable context"
    - ".workflow/.workflow-runs/"
    - "session history"
    - "project docs and nearby comments"
  closeout_artifact:
    location: ".workflow/.workflow-runs/<run-id>/closeout.md"
    required_contents:
      - "what changed"
      - "how it was handled"
      - "verification result"
      - "whether bounded local memory needs an update"
  durable_update_allowed_for:
    - "architecture decisions"
    - "reusable traps"
    - "durable design facts"
  forbidden:
    - "require Pinecone or any external vector-memory upsert as a completion gate"
    - "write transient task state, TODOs, raw logs, or wizard state to long-term memory"

delegation_policy:
  low_model_task_classes:
    shell_exact:
      description: "Run exact commands supplied by the lead agent."
      examples:
        - "git status --short"
        - "npm test -- api"
        - "cargo test"
      required_capabilities:
        - "run shell command in workspace"
        - "return stdout, stderr, and exit code"
    search_exact:
      description: "Search exact strings or regex patterns supplied by the lead agent."
      examples:
        - "rg -n \"add_source|remove_source\" src src-tauri"
      required_capabilities:
        - "run ripgrep or equivalent"
        - "return concise hit list"
    file_excerpt:
      description: "Read fixed files or fixed line ranges supplied by the lead agent."
      examples:
        - "read src-tauri/src/commands/sources.rs"
      required_capabilities:
        - "read workspace files"
        - "preserve path and line references"
    log_filter:
      description: "Filter known logs with exact keywords supplied by the lead agent."
      examples:
        - "filter logs for app.exe lock"
      required_capabilities:
        - "read log files"
        - "return matching lines and timestamps"
    diff_summary:
      description: "Collect git status, changed file lists, and diff stats."
      examples:
        - "git diff --stat"
        - "git diff --name-status"
      required_capabilities:
        - "run git read-only commands"
        - "return file list and stats"
    closeout_exact:
      description: "Stage, commit, push, or close an issue only when every file path and message is supplied."
      examples:
        - "git add <explicit files>"
        - "git commit -m \"fix #123\""
      required_capabilities:
        - "run exact git or gh command"
        - "stop on non-zero exit"
      constraints:
        - "no choosing files"
        - "no inventing commit messages"
        - "no force push"
  forbidden_for_low_judgment_workers:
    - "choose the root cause"
    - "decide whether a PR is safe"
    - "edit code without a fully specified patch scope"
    - "rewrite architecture"
    - "invent new requirements"
  runner_registry:
    local-small-worker:
      display_name: "小N"
      availability_probe: "ollama --version"
      status_if_probe_passes: "available"
      intended_task_classes:
        - "shell_exact"
        - "search_exact"
        - "file_excerpt"
        - "log_filter"
        - "diff_summary"
        - "closeout_exact"
      notes:
        - "Prefer this for fast deterministic execution when Ollama exists."
        - "Do not ask it to reason about architecture or root cause."
    remote-general-worker:
      display_name: "小G"
      availability_probe: "adapter-managed"
      status_if_probe_passes: "available"
      intended_task_classes:
        - "file_excerpt"
        - "diff_summary"
        - "checklist_review"
        - "summary_draft"
      notes:
        - "Use when local-small-worker is unavailable or the task needs light summarization."
        - "Lead agent still owns final decisions."
    lead-agent:
      display_name: "Lead"
      availability_probe: "current session"
      intended_task_classes:
        - "root_cause"
        - "architecture_decision"
        - "code_edit"
        - "risk_acceptance"
        - "final_integration"
      notes:
        - "Owns judgment, patch design, and final verification decision."
  runner_selection:
    rule: "Match the step's task_class to a runner with a passing availability_probe. If no low-model runner is available, record skipped delegation or wait for explicit Lead-managed low-model handoff without changing the workflow route."
    execution_modes:
      record: "Write a low-model packet but do not call a model or external runner."
      hermes: "Resolve Hermes CLI, probe ollama --version, then send the packet to 小N when available or 小G fallback when Ollama is unavailable."
      ollama-review: "Send the packet to an OpenAI-compatible chat completions endpoint for low-judgment review only."
      command: "Pass the packet path to an external wrapper via WORKFLOW_LOW_MODEL_COMMAND. Use this when a non-Hermes external runner should execute delegated work."
    lead_low_model_profile: "Uses record mode with WORKFLOW_LOW_MODEL_HANDOFF_REQUIRED=1. The runner only creates the packet; Lead must explicitly hand it to a low model before counting delegation as complete."
    prefer_order:
      - "local-small-worker"
      - "remote-general-worker"
      - "lead-agent"

workflows:
  feature-dev:
    description: "Develop a new feature request through requirement clarification, existing-code discovery, impact analysis, implementation, and closeout gates."
    inputs:
      required:
        - name: "feature_request"
          example: "Add comic slide reading mode."
      optional:
        - name: "feature_keywords"
          example: "comic|slide|reader|gallery"
        - name: "acceptance_hint"
          example: "User can open an item and navigate images with previous/next controls."
        - name: "base_ref"
          example: "origin/main"

    evidence:
      required_artifacts:
        - "plain-language feature goal and non-goals"
        - "acceptance checks before editing"
        - "git status before editing"
        - "related existing code when keywords are provided"
        - "architecture or trap memory search"
        - "impact analysis for symbols before editing"
        - "build verification output"
        - "detect_changes output before commit"
      commands:
        git_status: "git status --short --branch"
        search_feature_terms: "rg -n \"{feature_keywords}\" src src-tauri"
        diff_stat: "git diff --stat"
        changed_files: "git diff --name-status"
        recent_commits: "git log --oneline --decorate -n 10"

    steps:
      - id: "collect-status"
        type: "shell"
        command_ref: "git_status"
        output: "git_status"
        delegate: "allowed"
        task_class: "diff_summary"

      - id: "clarify-feature"
        type: "ai"
        input:
          - "feature_request"
          - "acceptance_hint"
        output_schema:
          type: "object"
          required:
            - "plain_language_goal"
            - "non_goals"
            - "acceptance_checks"
            - "candidate_areas"
            - "open_questions"

      - id: "search-existing-code"
        type: "shell"
        when: "feature_keywords is provided"
        command_ref: "search_feature_terms"
        output: "code_hits"
        delegate: "allowed"
        task_class: "search_exact"

      - id: "memory-search"
        type: "tool-or-shell"
        strategy:
          preferred:
            - "read .mc-memory/MEMORY.md for durable project memory"
            - "read .mc-memory/PROJECTS.md and .mc-memory/USER.md only when present and relevant"
            - "review prior .workflow/.workflow-runs/ artifacts and session history"
            - "read project docs and nearby comments"
          fallback:
            - "use focused rg/code search when local memory files are absent"
        output: "memory_notes"

      - id: "impact-before-edit"
        type: "tool-or-shell"
        strategy:
          preferred:
            - "GitNexus impact for each candidate area or symbol"
          fallback:
            - "rg imports and call sites for likely owner modules"
        output: "impact_notes"

      - id: "implementation-plan"
        type: "ai"
        input:
          - "feature_request"
          - "acceptance_hint"
          - "clarify-feature"
          - "code_hits"
          - "memory_notes"
          - "impact_notes"
        output_schema:
          type: "object"
          required:
            - "files_to_change"
            - "minimal_patch_plan"
            - "tests_to_run"
            - "low_model_subtasks"
            - "risks"

      - id: "implement"
        type: "code-edit"
        blocks_downstream: true
        constraints:
          - "lead agent owns feature design and code edits"
          - "keep the first version narrow and acceptance-check driven"
          - "preserve unrelated user changes"
          - "use existing UI/components/composables before adding new abstractions"
          - "increment version manually when code changes"
          - "do not allow runner to continue into verify before this manual edit is actually completed"
        output: "patch_summary"

      - id: "verify"
        type: "shell"
        commands:
          - "npm run build"
        continue_on_failure: true
        output: "verification_output"
        delegate: "allowed"
        task_class: "shell_exact"

      - id: "detect-changes"
        type: "tool-or-shell"
        strategy:
          preferred:
            - "GitNexus detect_changes"
          fallback:
            - "git diff --stat and changed file review"
        output: "change_impact"

      - id: "adjacent-regression-review"
        type: "ai"
        input:
          - "patch_summary"
          - "verification_output"
          - "change_impact"
          - "implementation-plan"
        checks:
          - "same-level model review only; do not delegate this to low-judgment workers"
          - "inspect modified/new files and the nearest callers, sibling interactions, event handlers, UI bindings, state updates, and keyboard/context-menu behavior"
          - "look for side effects near the changed feature, such as a new thumbnail button breaking card right-click behavior"
          - "name concrete adjacent scenarios that still need manual or automated checking"
          - "return blocking findings before closeout"
        output_schema:
          type: "object"
          required:
            - "status"
            - "adjacent_features_checked"
            - "blocking_findings"
            - "suggested_followup_checks"

      - id: "closeout-checklist"
        type: "ai"
        input:
          - "patch_summary"
          - "verification_output"
          - "change_impact"
          - "adjacent-regression-review"
        checks:
          - "acceptance checks are satisfied or explicitly deferred"
          - "adjacent regression review completed by same-level model after build/test"
          - "blocking adjacent findings are fixed or explicitly acknowledged by lead/user"
          - "version incremented"
          - "workflow run closeout artifact records what changed, how it was handled, verification result, and whether bounded local memory needs an update"
          - "bounded local memory is updated only for durable architecture, trap, or design facts"
          - "npm run build stamp changes in index.html and src-tauri/tauri.conf.json are either included in the closeout commit or intentionally reverted before commit"
          - "GitNexus analyze is allowed before the normal commit only when a required GitNexus query, impact, or detect_changes step reports a stale index and the next decision depends on GitNexus"
          - "Codex PostToolUse stale warnings after commit, merge, push, or fast-forward are advisory; do not rerun analyze solely because HEAD advanced"
          - "commit message uses normal feature wording unless this feature is tied to a GitHub Issue"
          - "changes are committed before reporting the feature complete"
          - "commit is pushed before reporting the feature complete, unless the user explicitly requests local-only work"
          - "no force push; branch protection failures require lead/user approval instead of automatic retry"
        output_format: "markdown"

    gates:
      fail_if:
        - "impact-before-edit did not run before implement"
        - "verify ran before manual implementation completed"
        - "npm run build exits non-zero"
        - "adjacent-regression-review did not run after verification"
        - "adjacent-regression-review reports blocking findings without lead-agent acknowledgement"
        - "code changed without version increment"
        - "detect_changes reports unexpected HIGH or CRITICAL risk without lead-agent acknowledgement"
        - "code changed but no commit was created before final completion"
        - "commit was created but not pushed before final completion, unless the user explicitly requested local-only work"
        - "closeout reruns npx gitnexus analyze after commit, merge, push, or fast-forward only because a PostToolUse hook reports stale HEAD"
        - "closeout reruns npx gitnexus analyze only to refresh GitNexus stats or amend stats-only files"
        - "closeout attempts force push"
      warn_if:
        - "feature starts without acceptance checks"
        - "low-model runner is unavailable and delegation was skipped"

  github-issue-fix:
    description: "Fix a GitHub Issue using fixed evidence routes, explicit low-model delegation boundaries, and project closeout gates."
    inputs:
      required:
        - name: "issue_number"
          example: 63
        - name: "repo"
          example: "ml0427/Custom-tag-preview-software"
      optional:
        - name: "focus"
          example: "source lifecycle, DB cleanup, frontend API shape"
        - name: "base_ref"
          example: "origin/main"

    evidence:
      required_artifacts:
        - "GitHub issue title, body, labels, and comments"
        - "git status before editing"
        - "architecture or trap memory search"
        - "impact analysis for symbols before editing"
        - "build verification output"
        - "detect_changes output before commit"
      commands:
        issue_json: "gh issue view {issue_number} --repo {repo} --json number,title,body,labels,comments,state,url"
        git_status: "git status --short --branch"
        search_issue_terms: "rg -n \"{summarize-issue.issue_keywords}\" src src-tauri"
        diff_stat: "git diff --stat"
        changed_files: "git diff --name-status"
        recent_commits: "git log --oneline --decorate -n 10"

    steps:
      - id: "collect-issue"
        type: "shell"
        command_ref: "issue_json"
        output: "issue_json"
        delegate: "allowed"
        task_class: "shell_exact"

      - id: "collect-status"
        type: "shell"
        command_ref: "git_status"
        output: "git_status"
        delegate: "allowed"
        task_class: "diff_summary"

      - id: "summarize-issue"
        type: "ai"
        input:
          - "issue_json"
          - "focus"
        output_schema:
          type: "object"
          required:
            - "plain_language_goal"
            - "acceptance_checks"
            - "candidate_symbols"
            - "issue_keywords"

      - id: "search-related-code"
        type: "shell"
        command_ref: "search_issue_terms"
        output: "code_hits"
        delegate: "allowed"
        task_class: "search_exact"

      - id: "memory-search"
        type: "tool-or-shell"
        strategy:
          preferred:
            - "read .mc-memory/MEMORY.md for durable project memory"
            - "read .mc-memory/PROJECTS.md and .mc-memory/USER.md only when present and relevant"
            - "review prior .workflow/.workflow-runs/ artifacts and session history"
            - "read project docs and comments"
          fallback:
            - "use focused rg/code search when local memory files are absent"
        output: "memory_notes"

      - id: "impact-before-edit"
        type: "tool-or-shell"
        strategy:
          preferred:
            - "GitNexus impact for each candidate symbol"
          fallback:
            - "rg imports and call sites"
        output: "impact_notes"

      - id: "implementation-plan"
        type: "ai"
        input:
          - "issue_json"
          - "code_hits"
          - "memory_notes"
          - "impact_notes"
        output_schema:
          type: "object"
          required:
            - "files_to_change"
            - "minimal_patch_plan"
            - "tests_to_run"
            - "low_model_subtasks"

      - id: "fix"
        type: "code-edit"
        blocks_downstream: true
        constraints:
          - "lead agent owns code edits"
          - "minimal scoped change"
          - "preserve unrelated user changes"
          - "increment version manually when code changes"
          - "do not allow runner to continue into verify before this manual edit is actually completed"
        output: "patch_summary"

      - id: "verify"
        type: "shell"
        commands:
          - "npm run build"
        continue_on_failure: true
        output: "verification_output"
        delegate: "allowed"
        task_class: "shell_exact"

      - id: "detect-changes"
        type: "tool-or-shell"
        strategy:
          preferred:
            - "GitNexus detect_changes"
          fallback:
            - "git diff --stat and changed file review"
        output: "change_impact"

      - id: "adjacent-regression-review"
        type: "ai"
        input:
          - "patch_summary"
          - "verification_output"
          - "change_impact"
          - "implementation-plan"
          - "summarize-issue"
        checks:
          - "same-level model review only; do not delegate this to low-judgment workers"
          - "inspect modified/new files and the nearest callers, sibling interactions, event handlers, UI bindings, state updates, and keyboard/context-menu behavior"
          - "look for side effects near the changed fix, such as a new thumbnail button breaking card right-click behavior"
          - "name concrete adjacent scenarios that still need manual or automated checking"
          - "return blocking findings before closeout"
        output_schema:
          type: "object"
          required:
            - "status"
            - "adjacent_features_checked"
            - "blocking_findings"
            - "suggested_followup_checks"

      - id: "closeout-checklist"
        type: "ai"
        input:
          - "patch_summary"
          - "verification_output"
          - "change_impact"
          - "adjacent-regression-review"
        checks:
          - "adjacent regression review completed by same-level model after build/test"
          - "blocking adjacent findings are fixed or explicitly acknowledged by lead/user"
          - "version incremented"
          - "workflow run closeout artifact records what changed, how it was handled, verification result, and whether bounded local memory needs an update"
          - "bounded local memory is updated only for durable architecture, trap, or design facts"
          - "npm run build stamp changes in index.html and src-tauri/tauri.conf.json are either included in the closeout commit or intentionally reverted before commit"
          - "GitNexus analyze is allowed before the normal commit only when a required GitNexus query, impact, or detect_changes step reports a stale index and the next decision depends on GitNexus"
          - "Codex PostToolUse stale warnings after commit, merge, push, or fast-forward are advisory; do not rerun analyze solely because HEAD advanced"
          - "TS18028 from patch tooling against declaration files is treated as a patch-tool false positive only when npm run build, tsc --noEmit, or vue-tsc --noEmit are clean"
          - "commit message matches issue closeout rules"
          - "changes are committed before reporting the issue fix complete"
          - "commit is pushed before reporting the issue fix complete, unless the user explicitly requests local-only work"
          - "issue is actually closed after push"
          - "no force push; branch protection failures require lead/user approval instead of automatic retry"
        output_format: "markdown"

    gates:
      fail_if:
        - "impact-before-edit did not run before fix"
        - "verify ran before manual fix completed"
        - "npm run build exits non-zero"
        - "adjacent-regression-review did not run after verification"
        - "adjacent-regression-review reports blocking findings without lead-agent acknowledgement"
        - "code changed without version increment"
        - "detect_changes reports unexpected HIGH or CRITICAL risk without lead-agent acknowledgement"
        - "code changed but no commit was created before final completion"
        - "commit was created but not pushed before final completion, unless the user explicitly requested local-only work"
        - "closeout reruns npx gitnexus analyze after commit, merge, push, or fast-forward only because a PostToolUse hook reports stale HEAD"
        - "closeout reruns npx gitnexus analyze only to refresh GitNexus stats or amend stats-only files"
        - "closeout attempts force push"
      warn_if:
        - "low-model runner is unavailable and delegation was skipped"

  pr-review:
    description: "Review a pull request or branch diff with fixed evidence collection and findings-first output."
    inputs:
      required:
        - name: "base_ref"
          example: "main"
        - name: "target_ref"
          example: "HEAD"
      optional:
        - name: "pr_number"
          example: 123
        - name: "focus"
          example: "security, API shape, regression risk"

    evidence:
      required_artifacts:
        - "git diff"
        - "changed file list"
        - "build or test output when available"
        - "callers or consumers for shared/API changes when available"
      commands:
        diff: "git diff --stat {base_ref}...{target_ref} && git diff {base_ref}...{target_ref}"
        changed_files: "git diff --name-status {base_ref}...{target_ref}"
        recent_commits: "git log --oneline --decorate -n 20 {base_ref}..{target_ref}"

    steps:
      - id: "collect-diff"
        type: "shell"
        command_ref: "diff"
        output: "raw_diff"

      - id: "collect-changed-files"
        type: "shell"
        command_ref: "changed_files"
        output: "changed_files"
        delegate: "allowed"

      - id: "classify-change"
        type: "ai"
        input:
          - "changed_files"
          - "raw_diff"
        output_schema:
          type: "object"
          required:
            - "change_kinds"
            - "risk_areas"
            - "files_requiring_callers"
          properties:
            change_kinds:
              type: "array"
              allowed_values:
                - "api"
                - "ui"
                - "state"
                - "database"
                - "config"
                - "shared-util"
                - "tests"
                - "docs"
            risk_areas:
              type: "array"
            files_requiring_callers:
              type: "array"

      - id: "collect-impact"
        type: "tool-or-shell"
        when: "classify-change.files_requiring_callers is not empty"
        strategy:
          preferred:
            - "code graph impact query"
            - "route/API consumer map"
          fallback:
            - "rg imports and function references"
        output: "impact_notes"

      - id: "check-api-contracts"
        type: "ai"
        when: "api in classify-change.change_kinds"
        input:
          - "raw_diff"
          - "impact_notes"
        checks:
          - "response shape compatibility"
          - "status code changes"
          - "auth or permission drift"
          - "consumer property access mismatch"
        output: "api_findings"

      - id: "check-ui-regressions"
        type: "ai"
        when: "ui in classify-change.change_kinds or state in classify-change.change_kinds"
        input:
          - "raw_diff"
        checks:
          - "loading state"
          - "empty state"
          - "error state"
          - "race condition"
          - "stale state"
          - "responsive layout risk"
        output: "ui_findings"

      - id: "check-tests"
        type: "ai"
        input:
          - "raw_diff"
          - "classify-change"
        checks:
          - "coverage for changed behavior"
          - "snapshot-only changes"
          - "deleted or weakened assertions"
          - "missing regression test"
        output: "test_findings"

      - id: "verify"
        type: "shell"
        commands:
          - "npm run build"
        continue_on_failure: true
        output: "verification_output"

      - id: "final-review"
        type: "ai"
        input:
          - "raw_diff"
          - "classify-change"
          - "impact_notes"
          - "api_findings"
          - "ui_findings"
          - "test_findings"
          - "verification_output"
        output_format: "markdown"
        report_contract:
          order:
            - "blocking_findings"
            - "risky_findings"
            - "missing_tests"
            - "safe_parts"
            - "merge_recommendation"
          finding_fields:
            - "severity"
            - "file"
            - "line_or_area"
            - "problem"
            - "why_it_matters"
            - "suggested_fix"

    gates:
      fail_if:
        - "npm run build exits non-zero"
        - "blocking_findings is not empty"
        - "API contract changed without caller evidence"
      warn_if:
        - "shared-util changed without tests"
        - "UI behavior changed without loading/error/empty state coverage"

  bug-scan:
    description: "Trace a reported bug through fixed evidence routes before editing."
    inputs:
      required:
        - name: "symptom"
          example: "Clicking import asks the same category question repeatedly."
      optional:
        - name: "error_message"
          example: "TypeError: Cannot read properties of undefined"
        - name: "log_path"
          example: "logs/app.log"
        - name: "suspected_area"
          example: "external-change import workflow"
        - name: "reproduction_steps"
          example:
            - "Open app"
            - "Run batch import"
            - "Observe repeated prompt"

    evidence:
      required_artifacts:
        - "symptom summary"
        - "exact error text when provided"
        - "related source locations"
        - "runtime evidence or probe result before third fix attempt"
      commands:
        search_error: "rg -n --fixed-strings \"{error_message}\" ."
        search_symptom_terms: "rg -n \"{symptom_keywords}\" ."
        recent_changes: "git log --oneline --decorate -n 30 && git diff --stat"
        git_status: "git status --short"

    stop_rules:
      max_speculative_fixes: 2
      after_limit:
        required_action: "add log/probe or inspect runtime data before another code edit"
        report_phrase: "已經兩次修正仍未確認，先改走 probe 蒐證。"

    steps:
      - id: "explain-symptom"
        type: "ai"
        input:
          - "symptom"
          - "error_message"
        output_schema:
          type: "object"
          required:
            - "plain_language_meaning"
            - "initial_hypotheses"
            - "keywords"

      - id: "collect-status"
        type: "shell"
        command_ref: "git_status"
        output: "git_status"
        delegate: "allowed"

      - id: "search-error"
        type: "shell"
        when: "error_message is provided"
        command_ref: "search_error"
        output: "error_hits"
        delegate: "allowed"

      - id: "search-related-code"
        type: "shell"
        command_ref: "search_symptom_terms"
        output: "code_hits"
        delegate: "allowed"

      - id: "trace-data-flow"
        type: "ai"
        input:
          - "code_hits"
          - "error_hits"
          - "suspected_area"
        output_schema:
          type: "object"
          required:
            - "entry_points"
            - "data_flow"
            - "likely_breakpoints"
            - "files_to_read"

      - id: "read-focused-files"
        type: "file"
        input: "trace-data-flow.files_to_read"
        output: "focused_source"

      - id: "diagnose"
        type: "ai"
        input:
          - "focused_source"
          - "trace-data-flow"
          - "git_status"
        checks:
          - "null or undefined"
          - "async race"
          - "stale state"
          - "response shape mismatch"
          - "path or encoding issue"
          - "concurrency or repeated prompt issue"
        output_schema:
          type: "object"
          required:
            - "root_cause_candidate"
            - "confidence"
            - "minimal_fix_plan"
            - "probe_needed"

      - id: "probe-before-third-fix"
        type: "tool-or-code-edit"
        when: "attempt_count >= 2 or diagnose.probe_needed is true"
        action: "add temporary diagnostic log, breakpoint, or focused assertion"
        output: "probe_result"

      - id: "fix"
        type: "code-edit"
        when: "diagnose.confidence is high or probe_result confirms cause"
        constraints:
          - "minimal scoped change"
          - "do not refactor unrelated code"
          - "preserve user changes"
        output: "patch_summary"

      - id: "verify"
        type: "shell"
        commands:
          - "npm run build"
        continue_on_failure: true
        output: "verification_output"

      - id: "final-bug-report"
        type: "ai"
        input:
          - "symptom"
          - "diagnose"
          - "probe_result"
          - "patch_summary"
          - "verification_output"
        output_format: "markdown"
        report_contract:
          order:
            - "root_cause"
            - "what_changed"
            - "verification"
            - "remaining_risk"

    gates:
      fail_if:
        - "fix step ran without diagnosis confidence or probe confirmation"
        - "third speculative fix attempted without probe_result"
      warn_if:
        - "verification command cannot run in current environment"
        - "bug is fixed without a regression test or manual reproduction note"

closeout_policy:
  when_code_was_changed:
    required:
      - "increment version manually"
      - "run npm run build"
      - "write factual closeout artifact under .workflow/.workflow-runs/<run-id>/closeout.md"
      - "record whether bounded local memory needs an update"
      - "update .mc-memory only for durable architecture, trap, or design facts when applicable"
      - "include or intentionally clean npm run build stamp changes in index.html and src-tauri/tauri.conf.json before commit"
      - "run npx gitnexus analyze before the normal commit only when a required GitNexus query, impact, or detect_changes step reports a stale index and the next decision depends on GitNexus"
      - "create a commit before reporting completion"
      - "push the commit before reporting completion, unless the user explicitly requests local-only work"
    forbidden:
      - "require Pinecone or any external vector-memory upsert as a completion gate"
      - "store transient task state, TODOs, raw logs, or wizard state in long-term memory"
      - "write workflow state outside workflow run artifacts"
      - "run npx gitnexus analyze after commit, merge, push, or fast-forward solely because HEAD advanced, a PostToolUse hook reports stale index, or AGENTS.md/CLAUDE.md GitNexus stats could be refreshed"
      - "create or amend a post-commit GitNexus-stats-only change"
      - "force push without explicit lead/user approval"
  known_tool_limitations:
    - "Patch tooling can report TS18028 private identifier errors from declaration files even when npm run build, tsc --noEmit, or vue-tsc --noEmit are clean; treat this as a patch-tool false positive only after project verification is clean."
  report_language: "Traditional Chinese"
